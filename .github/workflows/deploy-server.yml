name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

permissions:
  contents: read

env:
  ZONE_NAME: mfaherty.net
  PURGE_DOMAIN: baby.mfaherty.net

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p server/tsconfig.json

      - name: Run tests
        run: npm run test -w server

  deploy:
    name: Deploy Worker
    runs-on: ubuntu-24.04
    needs: test
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # D1 migrations are idempotent — wrangler tracks applied migrations
      # and only runs new ones. Safe to run on every deploy.
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply baby-tracker-db --remote
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Deploy the Worker. Wrangler deploy is atomic — the new version
      # only goes live after a successful upload. R2 bucket binding is
      # declared in wrangler.toml and provisioned once via dashboard/CLI.
      - name: Deploy Worker
        run: npx wrangler deploy
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Purge cached responses for the API domain
      - name: Purge Cloudflare cache
        run: |
          ZONE_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones?name=${{ env.ZONE_NAME }}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json")
          ZONE_ID=$(echo "$ZONE_RESPONSE" | jq -r '.result[0].id // ""')
          if [ -z "$ZONE_ID" ]; then
            echo "Failed to get zone ID for ${{ env.ZONE_NAME }}"
            exit 1
          fi

          PURGE_RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"hosts": ["${{ env.PURGE_DOMAIN }}"]}')
          SUCCESS=$(echo "$PURGE_RESPONSE" | jq -r '.success // "false"' 2>/dev/null)
          if [ "$SUCCESS" != "true" ]; then
            echo "Failed to purge cache: $(echo "$PURGE_RESPONSE" | jq -c '.errors // []')"
            exit 1
          fi
          echo "Cache purged for ${{ env.PURGE_DOMAIN }}"
